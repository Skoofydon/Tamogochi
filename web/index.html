<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тамагочи-Общага</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="student-info">
                <div class="avatar-container">
                    <div class="avatar" id="avatar">🧑‍🎓</div>
                    <div class="status-bubble" id="statusBubble">😊</div>
                </div>
                <div class="name-level">
                    <h2 id="studentName">Студент</h2>
                    <div class="level-badge">
                        <span>🎓</span>
                        <span id="studentLevel">1 курс</span>
                    </div>
                </div>
            </div>
            <div class="wallet">
                <span class="coin">🪙</span>
                <span id="coinBalance">0</span>
            </div>
        </div>

        <div class="room">
            <div class="room-grid">
                <div class="bed-area">
                    <div class="bed">🛏️</div>
                    <div class="sleep-z" id="sleepZ">💤</div>
                </div>
                <div class="fridge-area">
                    <div class="fridge">🧊</div>
                    <div class="food-items" id="foodItems">🍎🍕</div>
                </div>
                <div class="desk-area">
                    <div class="desk">💻</div>
                    <div class="books" id="books">📚📖</div>
                </div>
                <div class="window-area">
                    <div class="window">🪟</div>
                    <div class="time-of-day" id="timeOfDay">☀️</div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-icon">⚡</div>
                <div class="stat-bar-container">
                    <div class="stat-bar energy-bar" id="energyBar"></div>
                </div>
                <span class="stat-value" id="energyValue">100%</span>
            </div>
            <div class="stat-item">
                <div class="stat-icon">🍔</div>
                <div class="stat-bar-container">
                    <div class="stat-bar food-bar" id="foodBar"></div>
                </div>
                <span class="stat-value" id="foodValue">100%</span>
            </div>
            <div class="stat-item">
                <div class="stat-icon">😊</div>
                <div class="stat-bar-container">
                    <div class="stat-bar mood-bar" id="moodBar"></div>
                </div>
                <span class="stat-value" id="moodValue">100%</span>
            </div>
            <div class="stat-item">
                <div class="stat-icon">📚</div>
                <div class="stat-bar-container">
                    <div class="stat-bar study-bar" id="studyBar"></div>
                </div>
                <span class="stat-value" id="studyValue">0%</span>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn primary" data-action="eat">
                <span class="btn-icon">🍽️</span>
                <span class="btn-text">Поесть</span>
                <span class="btn-cost">-5🪙</span>
            </button>
            <button class="action-btn primary" data-action="sleep">
                <span class="btn-icon">😴</span>
                <span class="btn-text">Поспать</span>
                <span class="btn-time">3ч</span>
            </button>
            <button class="action-btn secondary" data-action="study">
                <span class="btn-icon">📝</span>
                <span class="btn-text">Учёба</span>
                <span class="btn-gain">+XP</span>
            </button>
            <button class="action-btn secondary" data-action="work">
                <span class="btn-icon">💼</span>
                <span class="btn-text">Подработка</span>
                <span class="btn-gain">+🪙</span>
            </button>
            <button class="action-btn danger" data-action="steal">
                <span class="btn-icon">🥷</span>
                <span class="btn-text">Стырить еду</span>
                <span class="btn-risk">Риск</span>
            </button>
            <button class="action-btn special" data-action="party">
                <span class="btn-icon">🎉</span>
                <span class="btn-text">Вписка</span>
                <span class="btn-social">+Друзья</span>
            </button>
            <button class="action-btn success" data-action="save">
                <span class="btn-icon">💾</span>
                <span class="btn-text">Сохранить</span>
                <span class="btn-gain">📤</span>
            </button>
        </div>

        <div class="event-log" id="eventLog">
            <div class="log-entry">🏠 Добро пожаловать в общагу!</div>
            <div class="log-entry">💡 Жми на кнопки, чтобы выжить</div>
        </div>

        <div class="bottom-menu">
            <button class="menu-btn active" data-tab="room">🏠 Комната</button>
            <button class="menu-btn" data-tab="shop">🛒 Магазин</button>
            <button class="menu-btn" data-tab="rating">🏆 Рейтинг</button>
            <button class="menu-btn" data-tab="friends">👥 Соседи</button>
        </div>

        <div class="modal" id="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">Событие</h3>
                    <button class="modal-close" id="modalClose">✕</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer">
                    <button class="modal-btn" id="modalBtn">Понятно</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
